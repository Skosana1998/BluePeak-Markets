<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BluePeak Markets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #070b1a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  background: linear-gradient(90deg, #004cff, #00c3ff);
  font-weight: bold;
}

/* SECTION */
.container {
  padding: 12px;
}

h3 {
  color: #00c3ff;
  margin: 10px 0;
}

/* SMALL GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

/* CARD */
.card {
  background: #111a33;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid #1f2b55;
  transition: 0.2s;
}

/* ACTIVE STATE (IMPORTANT FIX) */
.active {
  background: #003cff !important;
  border: 1px solid #00c3ff;
  transform: scale(1.03);
}

.card:hover {
  border-color: #00c3ff;
}

/* POPULAR TAG */
.popular {
  background: gold;
  color: black;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 5px;
  margin-top: 5px;
  display: inline-block;
}

/* RULE BOX */
.rules {
  background: #0d1630;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.5;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #00c3ff;
  color: black;
  font-weight: bold;
  border-radius: 8px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  align-items: center;
  justify-content: center;
}

.popup-box {
  background: #111a33;
  padding: 20px;
  border-radius: 10px;
  width: 80%;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

.small {
  font-size: 11px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>BLUEPEAK MARKETS</header>

<div class="container">

<!-- MODEL -->
<h3>Account Model</h3>
<div class="grid">
  <div class="card" onclick="select(this,'model','1 Step')">1 Step</div>
  <div class="card" onclick="select(this,'model','2 Step')">2 Step</div>
  <div class="card" onclick="select(this,'model','Instant')">Instant</div>
</div>

<!-- PLATFORM -->
<h3>Platform</h3>
<div class="grid">
  <div class="card" onclick="select(this,'platform','MT4')">MetaTrader 4</div>
  <div class="card" onclick="select(this,'platform','MT5')">
    MetaTrader 5
    <div class="popular">Most Popular</div>
  </div>
</div>

<!-- CHALLENGES (RESTORED CONTENT) -->
<h3>Challenge Sizes</h3>
<div class="grid">
  <div class="card" onclick="select(this,'account','5K')">R5,000</div>
  <div class="card" onclick="select(this,'account','25K')">R25,000</div>
  <div class="card" onclick="select(this,'account','50K')">R50,000</div>
  <div class="card" onclick="select(this,'account','100K')">
    R100,000
    <div class="popular">Most Popular</div>
  </div>
  <div class="card" onclick="select(this,'account','200K')">R200,000</div>
  <div class="card" onclick="select(this,'account','500K')">R500,000</div>
  <div class="card" onclick="select(this,'account','1M')">R1,000,000</div>
</div>

<!-- RULES -->
<div class="rules" id="rulesBox">
Select options to view rules...
</div>

<button class="btn" onclick="finalStep()">Continue</button>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <h3>Coming Soon 🚀</h3>
    <p>Not launched yet</p>
    <p class="small">Get notified when we go live</p>
    <input type="text" placeholder="Email / WhatsApp">
    <button class="btn">Get Notified</button>
    <button class="btn" style="background:red" onclick="closePopup()">Close</button>
  </div>
</div>

<script>

let selected = {
  model: "",
  platform: "",
  account: ""
};

/* FIXED SELECTION SYSTEM (STAYS HIGHLIGHTED) */
function select(el, type, value){

  selected[type] = value;

  document.querySelectorAll(`[data-type='${type}']`).forEach(e=>{
    e.classList.remove("active");
  });

  el.classList.add("active");
  el.setAttribute("data-type", type);

  updateRules();
}

/* RULE ENGINE */
function updateRules(){

let r = "";

if(selected.model === "1 Step"){
r += "1 Step Model<br>Target: 10%<br>Max Daily Loss: 4%<br>Profit Split: up to 80%<br>";
}

if(selected.model === "2 Step"){
r += "2 Step Model<br>Phase 1: 10%<br>Phase 2: 4%<brMax Daily Loss: 5%<br>Profit Split: 85-90%<br>";
}

if(selected.model === "Instant"){
r += "Instant Account<br>Max Loss: 3%<br>Profit Split: 75%<br>";
}

if(selected.platform){
r += "<br>Platform: " + selected.platform;
}

if(selected.account){
r += "<br>Account: " + selected.account;
}

document.getElementById("rulesBox").innerHTML = r || "Select options to view rules...";
}

/* FINAL PRICE REVEAL */
function finalStep(){

let price = "";

switch(selected.account){
case "5K": price="R350"; break;
case "25K": price="R500"; break;
case "50K": price="R750"; break;
case "100K": price="R1100"; break;
case "200K": price="R2000"; break;
case "500K": price="R5400"; break;
case "1M": price="R65000"; break;
}

document.getElementById("rulesBox").innerHTML += "<br><br><b>Price:</b> " + price;
}

/* POPUP */
setTimeout(()=>{
document.getElementById("popup").style.display="flex";
},3000);

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
