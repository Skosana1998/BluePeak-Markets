<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BluePeak Markets</title>

<style>

/* ===================== ROOT ===================== */
:root{
--bg:#050814;
--panel:rgba(13,22,51,0.55);
--stroke:rgba(255,255,255,0.08);
--blue:#2D7DFF;
--cyan:#00E6FF;
--gold:#FFCC66;
--text:#EAF1FF;
--muted:#9FB3D9;
}

*{box-sizing:border-box;font-family:Arial,sans-serif}
body{
margin:0;
background:radial-gradient(circle at top,#0B1430,#050814);
color:var(--text);
overflow-x:hidden;
}

/* ===================== FLOAT BG ORBS ===================== */
.orb{
position:fixed;
width:300px;height:300px;
background:radial-gradient(circle,#2D7DFF55,transparent 70%);
filter:blur(40px);
animation:float 10s infinite ease-in-out;
z-index:0;
}
.orb2{top:20%;left:60%;animation-delay:2s}
.orb1{top:10%;left:10%}
.orb3{bottom:10%;left:40%;animation-delay:4s}

@keyframes float{
0%,100%{transform:translateY(0px)}
50%{transform:translateY(40px)}
}

/* ===================== HEADER ===================== */
header{
position:sticky;
top:0;
z-index:10;
display:flex;
justify-content:space-between;
padding:18px 22px;
backdrop-filter:blur(12px);
background:rgba(10,15,40,0.4);
border-bottom:1px solid var(--stroke);
}

.logo{
font-size:22px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,var(--blue),var(--cyan),var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:moveText 4s linear infinite;
}

@keyframes moveText{
0%{background-position:0%}
100%{background-position:200%}
}

/* ===================== LAYOUT ===================== */
.container{
position:relative;
z-index:2;
max-width:1100px;
margin:auto;
padding:20px;
}

.section{
margin-top:18px;
padding:16px;
background:var(--panel);
border:1px solid var(--stroke);
border-radius:16px;
backdrop-filter:blur(15px);
}

/* ===================== TITLES ===================== */
.title{
font-size:12px;
color:var(--muted);
margin-bottom:10px;
letter-spacing:1px;
}

/* ===================== BUTTONS ===================== */
.btn{
padding:10px 14px;
border-radius:12px;
cursor:pointer;
border:none;
font-weight:600;
margin:5px;
transition:0.25s;
}

.primary{
background:linear-gradient(135deg,var(--blue),var(--cyan));
color:#fff;
}

.dark{
background:rgba(255,255,255,0.04);
color:var(--text);
border:1px solid var(--stroke);
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(45,125,255,0.4);
}

/* ===================== GRID ===================== */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
background:rgba(255,255,255,0.03);
border:1px solid var(--stroke);
padding:12px;
border-radius:14px;
cursor:pointer;
text-align:center;
font-size:12px;
transition:0.25s;
position:relative;
}

.card:hover{
transform:translateY(-4px);
border-color:var(--blue);
}

.selected{
border:2px solid var(--blue);
box-shadow:0 0 25px rgba(45,125,255,0.4);
transform:scale(1.03);
}

.popular{
position:absolute;
top:6px;
right:6px;
background:var(--gold);
color:#000;
font-size:9px;
padding:3px 6px;
border-radius:10px;
font-weight:bold;
}

/* ===================== PRICE ===================== */
.price{
margin-top:10px;
color:#00FFB3;
font-weight:bold;
display:none;
}

/* ===================== MODAL ===================== */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.6);
z-index:99;
}

.modal-box{
width:340px;
background:rgba(13,22,51,0.9);
border:1px solid var(--blue);
border-radius:14px;
padding:18px;
backdrop-filter:blur(10px);
}

.close{
float:right;
cursor:pointer;
color:#FF4D4D;
}

/* ===================== POPUP ===================== */
.popup{
position:fixed;
bottom:-200px;
left:20px;
right:20px;
background:rgba(13,22,51,0.9);
border:1px solid var(--blue);
padding:14px;
border-radius:14px;
transition:0.5s;
z-index:100;
}

/* ===================== NOTIFY ===================== */
.notify{
position:fixed;
top:80px;
right:20px;
background:rgba(13,22,51,0.9);
border:1px solid var(--blue);
padding:12px;
border-radius:12px;
display:none;
}

/* ===================== MOBILE ===================== */
@media(max-width:800px){
.grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<header>
<div class="logo">BLUEPEAK MARKETS</div>
<div style="font-size:12px;color:#9FB3D9">Ultra Premium Trading Hub</div>
</header>

<div class="container">

<!-- MODE -->
<div class="section">
<div class="title">MODEL TYPE</div>
<button class="btn dark" onclick="selectMode('1step')">1 STEP</button>
<button class="btn dark" onclick="selectMode('2step')">2 STEP</button>
<button class="btn dark" onclick="selectMode('instant')">INSTANT</button>
</div>

<!-- PLATFORM -->
<div class="section">
<div class="title">PLATFORM</div>
<button class="btn dark" onclick="selectPlatform('MT4')">MT4</button>
<button class="btn dark" onclick="selectPlatform('MT5')">MT5 <span style="color:var(--gold)">Most Popular</span></button>
</div>

<!-- ACCOUNTS -->
<div class="section">
<div class="title">ACCOUNT SIZES (ZAR)</div>

<div class="grid">

<div class="card" onclick="selectAccount(this,'5k')">5K</div>
<div class="card" onclick="selectAccount(this,'25k')">25K</div>
<div class="card" onclick="selectAccount(this,'50k')">50K</div>

<div class="card" onclick="selectAccount(this,'100k')">
100K <div class="popular">POPULAR</div>
</div>

<div class="card" onclick="selectAccount(this,'200k')">200K</div>
<div class="card" onclick="selectAccount(this,'500k')">500K</div>
<div class="card" onclick="selectAccount(this,'1m')">1M</div>

</div>

<div id="price" class="price"></div>

<button class="btn primary" onclick="showRules()">VIEW RULES</button>
<button class="btn dark" onclick="notify()">GET NOTIFIED</button>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>
<h3>RULES</h3>
<div id="rules"></div>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
🔥 BUY 1 GET FREE 50K CHALLENGE (COMING SOON)
</div>

<!-- NOTIFY -->
<div class="notify" id="notify">✔ You’ll be notified at launch</div>

<script>

let mode="",platform="",account="";

function selectMode(m){
mode=m;
highlight(event.target);
}

function selectPlatform(p){
platform=p;
highlight(event.target);
}

function selectAccount(el,a){
account=a;

document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
el.classList.add('selected');

document.getElementById("price").style.display="block";
document.getElementById("price").innerText="Selected: "+a.toUpperCase();
}

function highlight(el){
el.style.boxShadow="0 0 20px #2D7DFF";
setTimeout(()=>el.style.boxShadow="none",400);
}

function showRules(){
if(!account)return alert("Select account first");

let r="";

if(mode==="instant"){
r=`Max DD 3%<br>Profit Split 75%<br>Leverage 1:500`;
}

if(mode==="1step"){
r=`Target 10%<br>DD 4%<br>Profit Split 80%`;
}

if(mode==="2step"){
r=`Phase 1:10%<br>Phase 2:4%<br>DD 5%<br>Profit Split 85-90%`;
}

document.getElementById("rules").innerHTML=r;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function notify(){
document.getElementById("notify").style.display="block";
setTimeout(()=>document.getElementById("notify").style.display="none",3000);
}

setTimeout(()=>{
document.getElementById("popup").style.bottom="20px";
},3000);

</script>

</body>
</html>
