<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BluePeak Markets</title>

<style>
body{
margin:0;
font-family:Arial;
background:#060A1A;
color:#EAF1FF;
overflow-x:hidden;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:18px 22px;
align-items:center;
background:rgba(10,15,40,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:10;
}
.logo{
font-size:20px;
font-weight:bold;
color:#2D7DFF;
letter-spacing:1px;
}
.tag{
font-size:12px;
padding:5px 10px;
border:1px solid #2D7DFF;
border-radius:20px;
color:#9FB3D9;
}

/* GRID */
.container{padding:20px;max-width:1100px;margin:auto;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.card{
background:#0D1633;
padding:10px;
border-radius:12px;
cursor:pointer;
text-align:center;
font-size:12px;
border:1px solid rgba(255,255,255,0.05);
transition:0.2s;
position:relative;
}

.card:hover{
transform:scale(1.04);
border-color:#2D7DFF;
}

.selected{
border:2px solid #2D7DFF;
box-shadow:0 0 15px rgba(45,125,255,0.4);
}

.popular{
position:absolute;
top:5px;
right:5px;
background:#FFCC66;
color:#000;
font-size:9px;
padding:3px 6px;
border-radius:10px;
font-weight:bold;
}

/* BUTTONS */
.btn{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}
.primary{background:#2D7DFF;color:#fff;}
.dark{background:#121a33;color:#fff;border:1px solid #2D7DFF;}

/* SECTIONS */
.section{
margin-top:18px;
padding:15px;
background:rgba(255,255,255,0.03);
border-radius:12px;
}

.title{
font-size:13px;
color:#9FB3D9;
margin-bottom:10px;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.modal-box{
background:#0D1633;
padding:20px;
border-radius:12px;
width:320px;
border:1px solid #2D7DFF;
}

.close{
float:right;
cursor:pointer;
color:#FF4D4D;
}

/* POPUP */
.popup{
position:fixed;
bottom:-200px;
left:20px;
right:20px;
background:#0D1633;
padding:15px;
border-radius:12px;
border:1px solid #2D7DFF;
transition:0.5s;
z-index:99;
}

/* NOTIFY */
.notify{
position:fixed;
top:70px;
right:20px;
background:#0D1633;
padding:12px;
border-radius:10px;
border:1px solid #2D7DFF;
display:none;
}

/* PRICE REVEAL */
.price{
margin-top:10px;
font-size:14px;
color:#00E6A7;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<header>
<div class="logo">BLUEPEAK MARKETS</div>
<div class="tag">Premium Trading Hub</div>
</header>

<div class="container">

<!-- MODE -->
<div class="section">
<div class="title">Select Model Type</div>
<button class="btn dark" onclick="selectMode('1step')">1 STEP</button>
<button class="btn dark" onclick="selectMode('2step')">2 STEP</button>
<button class="btn dark" onclick="selectMode('instant')">INSTANT</button>
</div>

<!-- PLATFORM -->
<div class="section">
<div class="title">Platform</div>
<button class="btn dark" onclick="selectPlatform('MT4')">MetaTrader 4</button>
<button class="btn dark" onclick="selectPlatform('MT5')">MetaTrader 5 <span style="color:#FFCC66;">Most Popular</span></button>
</div>

<!-- ACCOUNTS -->
<div class="section">
<div class="title">Account Sizes (ZAR)</div>

<div class="grid">

<div class="card" onclick="selectAccount(this,'5k')">5K</div>
<div class="card" onclick="selectAccount(this,'25k')">25K</div>
<div class="card" onclick="selectAccount(this,'50k')">50K</div>
<div class="card" onclick="selectAccount(this,'100k')">
100K <div class="popular">POPULAR</div>
</div>

<div class="card" onclick="selectAccount(this,'200k')">200K</div>
<div class="card" onclick="selectAccount(this,'500k')">500K</div>
<div class="card" onclick="selectAccount(this,'1m')">1M</div>

</div>

<div id="price" class="price"></div>

<button class="btn primary" onclick="showRules()">View Rules</button>
<button class="btn dark" onclick="notifyMe()">Get Notified (Not Launched Yet)</button>

</div>

</div>

<!-- RULE MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">X</span>
<h3>Account Rules</h3>
<div id="rules"></div>
</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
🔥 BUY 1 GET FREE 50K CHALLENGE (COMING SOON)  
<button class="btn primary" onclick="closePopup()">OK</button>
</div>

<!-- NOTIFY -->
<div class="notify" id="notify">
✔ You will be notified when BluePeak launches
</div>

<script>

let mode = "";
let platform = "";
let account = "";

function selectMode(m){
mode = m;
highlight(event.target);
}

function selectPlatform(p){
platform = p;
highlight(event.target);
}

function selectAccount(el,a){
account = a;

document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
el.classList.add('selected');

/* fake pricing reveal AFTER selection */
document.getElementById("price").style.display="block";
document.getElementById("price").innerText="Selected Account: "+a.toUpperCase();
}

/* highlight buttons */
function highlight(el){
el.style.boxShadow="0 0 15px #2D7DFF";
setTimeout(()=>el.style.boxShadow="none",400);
}

/* RULES */
function showRules(){
if(!account) return alert("Select account first");

let rules = "";

if(mode==="instant"){
rules = `
Max Daily Loss: 3%<br>
Leverage: 1:500<br>
Profit Split: 75%<br>
Daily Payouts Enabled`;
}

if(mode==="1step"){
rules = `
Phase 1 Target: 10%<br>
Max Daily Loss: 4%<br>
Leverage: 1:500<br>
Profit Split: 80%`;
}

if(mode==="2step"){
rules = `
Phase 1: 10%<br>
Phase 2: 4%<br>
Max Daily Loss: 5%<br>
Profit Split: 85–90%`;
}

document.getElementById("rules").innerHTML=rules;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* NOTIFY */
function notifyMe(){
document.getElementById("notify").style.display="block";
setTimeout(()=>{
document.getElementById("notify").style.display="none";
},3000);
}

/* POPUP after 3 seconds */
setTimeout(()=>{
document.getElementById("popup").style.bottom="20px";
},3000);

function closePopup(){
document.getElementById("popup").style.bottom="-200px";
}

</script>

</body>
</html>
