<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePeak Markets | Challenge Builder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050714;
  --card:rgba(255,255,255,0.04);
  --stroke:rgba(255,255,255,0.08);
  --blue:#3b82f6;
  --gold:#f5c542;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
  background:radial-gradient(circle at top,#0a1030,#050714);
  color:#fff;
}

.container{
  width:min(1050px,92%);
  margin:auto;
  padding:40px 0;
}

h1{
  font-family:Orbitron;
  text-align:center;
  margin-bottom:8px;
}

.sub{
  text-align:center;
  color:#a9b4d0;
  margin-bottom:25px;
}

.badge{
  display:block;
  width:max-content;
  margin:auto;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(59,130,246,0.15);
  color:var(--blue);
  font-size:12px;
  margin-bottom:25px;
}

/* SMALLER ACCOUNT GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--stroke);
  border-radius:12px;
  padding:10px;
  cursor:pointer;
  transition:0.2s ease;
  text-align:center;
  min-height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--blue);
}

.selected{
  border:2px solid var(--blue);
  box-shadow:0 0 12px rgba(59,130,246,0.25);
}

.card h3{
  font-size:12px;
  font-weight:700;
}

/* SELECTORS */
.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:18px;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  background:#0b1028;
  color:#fff;
  border:1px solid rgba(255,255,255,0.1);
}

/* RULE PANEL */
.panel{
  margin-top:18px;
  padding:18px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  line-height:1.7;
  font-size:14px;
  min-height:160px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:18px;
  padding:12px 16px;
  border-radius:12px;
  background:linear-gradient(135deg,#3b82f6,#1d4ed8);
  color:#fff;
  text-decoration:none;
  font-weight:700;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>BluePeak Markets</h1>
<div class="sub">Peak Pro Standards • Challenge Builder System</div>
<div class="badge">Select Account → Model → Platform</div>

<!-- ACCOUNTS -->
<h3 style="margin-bottom:10px;">Select Account Size (ZAR)</h3>

<div class="grid" id="accounts">

<div class="card" onclick="selectAccount(5000,event)">
<h3>R5K</h3>
</div>

<div class="card" onclick="selectAccount(25000,event)">
<h3>R25K</h3>
</div>

<div class="card" onclick="selectAccount(50000,event)">
<h3>R50K</h3>
</div>

<div class="card" onclick="selectAccount(100000,event)">
<h3>R100K</h3>
</div>

<div class="card" onclick="selectAccount(200000,event)">
<h3>R200K</h3>
</div>

<div class="card" onclick="selectAccount(500000,event)">
<h3>R500K</h3>
</div>

<div class="card" onclick="selectAccount(1000000,event)">
<h3>R1M</h3>
</div>

</div>

<!-- SELECTORS -->
<div class="row">

<select id="model" onchange="updateRules()">
<option value="1step">1 Step Model</option>
<option value="2step">2 Step Model</option>
<option value="instant">Instant Model</option>
</select>

<select id="platform">
<option>MetaTrader 4</option>
<option>MetaTrader 5</option>
</select>

<select>
<option>Peak Pro Standards</option>
</select>

</div>

<!-- RULE PANEL -->
<div class="panel" id="rules">
Select an account size to see challenge rules...
</div>

<a class="btn" href="#">Get Notified (Not Launched Yet)</a>

</div>

<script>

let selectedAccount = 5000;

function selectAccount(size,event){
selectedAccount = size;

document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
event.currentTarget.classList.add('selected');

updateRules();
}

function updateRules(){

let model = document.getElementById("model").value;

let text = "";

if(model === "1step"){
text = `
<b>1 STEP MODEL</b><br><br>
Phase 1 Target: 10%<br>
Max Daily Loss: 4%<br>
Leverage: 1:500<br>
Profit Split: Up to 75%<br>
Daily Payouts: Yes<br><br>
<b>Account:</b> R${selectedAccount}
`;
}

if(model === "2step"){
text = `
<b>2 STEP MODEL</b><br><br>
Phase 1 Target: 10%<br>
Phase 2 Target: 4%<br>
Max Daily Loss: 5%<br>
Leverage: 1:500<br>
Profit Split: Up to 85%<br>
Daily Payouts: Yes<br><br>
<b>Account:</b> R${selectedAccount}
`;
}

if(model === "instant"){
text = `
<b>INSTANT ACCOUNT</b><br><br>
Max Daily Loss: 3%<br>
Leverage: 1:500<br>
Profit Split: 75%<br>
Daily Payouts: Yes<br>
Instant Funding Active<br><br>
<b>Account:</b> R${selectedAccount}
`;
}

document.getElementById("rules").innerHTML = text;
}

</script>

</body>
</html>
