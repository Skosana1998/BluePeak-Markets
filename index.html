<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePeak Markets | Launch</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    text-align:center;
}

/* BACKGROUND ANIMATION */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,0,80,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,80,0.1), transparent 50%);
    animation:move 8s infinite alternate;
    z-index:-1;
}

@keyframes move{
    from{transform:translateY(0)}
    to{transform:translateY(-40px)}
}

/* HERO */
.hero{
    padding:120px 20px;
}

.hero h1{
    font-size:60px;
}

.hero span{color:#ff0033}

/* BADGE */
.badge{
    display:inline-block;
    margin-top:10px;
    padding:6px 12px;
    background:#ff0033;
    border-radius:6px;
    font-size:12px;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:14px 35px;
    background:#ff0033;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.whatsapp{
    background:#25D366;
}

/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:40px;
}

.time{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:10px;
}

/* LIVE COUNTER */
.live{
    margin-top:20px;
    color:#aaa;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
}

.box{
    background:#111;
    padding:30px;
    border-radius:12px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

.submit{
    margin-top:10px;
    padding:10px;
    background:#ff0033;
    border:none;
    color:#fff;
    width:100%;
}
</style>
</head>

<body>

<div class="bg"></div>

<section class="hero">

<h1>BluePeak Markets<br><span>Launching Soon</span></h1>

<div class="badge">🔥 50% OFF Launch Access</div>

<p>Trade firm capital. Earn like a pro.</p>

<!-- COUNTDOWN -->
<div class="countdown">
<div class="time"><h2 id="days"></h2><p>Days</p></div>
<div class="time"><h2 id="hours"></h2><p>Hours</p></div>
<div class="time"><h2 id="minutes"></h2><p>Minutes</p></div>
<div class="time"><h2 id="seconds"></h2><p>Seconds</p></div>
</div>

<!-- LIVE COUNTER -->
<div class="live">
🔥 <span id="users">1243</span> traders waiting to get funded
</div>

<button class="btn" onclick="openPopup()">Get Notified</button>
<br>
<button class="btn whatsapp" onclick="joinWhatsApp()">Join WhatsApp</button>

</section>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">
<h3>Join Launch List</h3>
<input type="email" placeholder="Enter email">
<button class="submit">Notify Me</button>
<button onclick="closePopup()" style="margin-top:10px;">Close</button>
</div>
</div>

<script>
// COUNTDOWN
var launchDate = new Date();
launchDate.setMonth(launchDate.getMonth()+6);

function update(){
    var now = new Date().getTime();
    var d = launchDate-now;

    document.getElementById("days").innerHTML=Math.floor(d/(1000*60*60*24));
    document.getElementById("hours").innerHTML=Math.floor((d%(1000*60*60*24))/(1000*60*60));
    document.getElementById("minutes").innerHTML=Math.floor((d%(1000*60*60))/(1000*60));
    document.getElementById("seconds").innerHTML=Math.floor((d%(1000*60))/1000);
}
setInterval(update,1000);

// LIVE USERS FAKE COUNTER
setInterval(()=>{
    let u=document.getElementById("users");
    u.innerHTML=parseInt(u.innerHTML)+Math.floor(Math.random()*3);
},3000);

// POPUP
function openPopup(){
    document.getElementById("popup").style.display="flex";
}
function closePopup(){
    document.getElementById("popup").style.display="none";
}

// WHATSAPP LINK
function joinWhatsApp(){
    window.open("https://wa.me/27636136117","_blank");
}
</script>

</body>
</html>
